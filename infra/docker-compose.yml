# Local development stack for the Internal AI Advertising Platform (Phase 2 backend).
# Usage (from repo root):  docker compose -f infra/docker-compose.yml up --build
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_ad_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_ad_platform"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../apps/api
    env_file:
      - ../apps/api/.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/ai_ad_platform
      DATABASE_URL_SYNC: postgresql+psycopg://postgres:postgres@db:5432/ai_ad_platform
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
